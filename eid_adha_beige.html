<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Nunito:wght@300;400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#f5ede0;font-family:'Nunito',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.page{width:100%;max-width:600px;text-align:center}
.top-ornament{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:32px}
.orb{width:8px;height:8px;border-radius:50%;background:#b5895a;opacity:.5}
.orb.big{width:12px;height:12px;opacity:.8}
.moon{font-size:52px;display:block;color:#b5895a;margin-bottom:20px;animation:sway 4s ease-in-out infinite alternate}
@keyframes sway{from{transform:rotate(-5deg)}to{transform:rotate(5deg)}}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,7vw,64px);font-weight:600;color:#7a4f2d;letter-spacing:3px;line-height:1.1;margin-bottom:8px;animation:rise 1s ease both}
h2{font-family:'Cormorant Garamond',serif;font-size:clamp(18px,3.5vw,28px);font-weight:300;color:#a07048;letter-spacing:6px;margin-bottom:36px;animation:rise 1s .2s ease both}
@keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.rule{display:flex;align-items:center;gap:10px;margin:0 auto 36px;max-width:300px;animation:rise 1s .3s ease both}
.rule-line{flex:1;height:1px;background:#c9a882;opacity:.5}
.rule-cross{font-size:16px;color:#b5895a}
.card{background:#fdf6ed;border:1px solid #dfc9a8;border-radius:16px;padding:36px 40px;margin-bottom:32px;animation:rise 1s .4s ease both}
.greeting{font-size:clamp(14px,2.2vw,17px);color:#7a5c3e;line-height:2;font-weight:300;letter-spacing:.3px;margin-bottom:24px}
.greeting span{color:#b5895a;font-weight:600}
.wishes{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:4px}
.wish{padding:6px 16px;background:#f0e2ce;border-radius:50px;font-size:12px;letter-spacing:1.5px;color:#8c6035;text-transform:uppercase;border:1px solid #dfc9a8}
.btn{margin-top:32px;padding:13px 36px;background:#b5895a;color:#fdf6ed;font-family:'Nunito',sans-serif;font-size:13px;letter-spacing:2.5px;text-transform:uppercase;border:none;border-radius:50px;cursor:pointer;transition:all .2s;animation:rise 1s .6s ease both}
.btn:hover{background:#7a4f2d;transform:translateY(-2px)}
.footer{margin-top:28px;font-family:'Cormorant Garamond',serif;font-size:14px;color:#b5895a;letter-spacing:3px;opacity:.7;animation:rise 1s .7s ease both}
.stars-row{display:flex;justify-content:center;gap:6px;margin:20px 0;animation:rise 1s .5s ease both}
.dot{width:5px;height:5px;background:#c9a882;border-radius:50%;opacity:.6}
#canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;display:none}
</style>

<canvas id="canvas"></canvas>

<div class="page">
  <div class="top-ornament">
    <div class="orb"></div><div class="orb"></div><div class="orb big"></div><div class="orb"></div><div class="orb"></div>
  </div>

  <span class="moon">☾</span>
  <h1>Eid Al-Adha</h1>
  <h2>Mubarak</h2>

  <div class="rule">
    <div class="rule-line"></div>
    <span class="rule-cross">✦</span>
    <div class="rule-line"></div>
  </div>

  <div class="card">
    <p class="greeting">
      Wishing you and your family a beautiful Eid<br>
      filled with <span>warmth</span>, <span>love</span>, and togetherness.<br><br>
      May Allah accept your good deeds,<br>
      and bring <span>joy</span> to every corner of your home.
    </p>
    <div class="wishes">
      <span class="wish">Peace</span>
      <span class="wish">Blessings</span>
      <span class="wish">Love</span>
      <span class="wish">Gratitude</span>
    </div>
  </div>

  <div class="stars-row">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>

  <button class="btn" onclick="celebrate()">Celebrate ✨</button>

  <p class="footer">Taqabbal Allahu Minna Wa Minkum</p>
</div>

<script>
const cv = document.getElementById('canvas');
const ctx = cv.getContext('2d');
let parts = [], anim;
function celebrate(){
  cv.style.display='block';
  cv.width=window.innerWidth; cv.height=window.innerHeight;
  parts=[];
  const cols=['#b5895a','#dfc9a8','#e8c99a','#f0e2ce','#7a4f2d','#c9a882','#fdf6ed'];
  for(let i=0;i<180;i++) parts.push({x:Math.random()*cv.width,y:-10-Math.random()*150,vx:(Math.random()-.5)*3,vy:Math.random()*3+2,sz:Math.random()*7+3,c:cols[Math.floor(Math.random()*cols.length)],r:Math.random()*360,rs:(Math.random()-.5)*8});
  if(anim) cancelAnimationFrame(anim);
  loop();
  setTimeout(()=>{cv.style.display='none'; cancelAnimationFrame(anim);},3500);
}
function loop(){
  ctx.clearRect(0,0,cv.width,cv.height);
  parts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.r+=p.rs;
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.r*Math.PI/180);
    ctx.fillStyle=p.c;
    ctx.fillRect(-p.sz/2,-p.sz/4,p.sz,p.sz/2);
    ctx.restore();
  });
  parts=parts.filter(p=>p.y<cv.height+20);
  if(parts.length>0) anim=requestAnimationFrame(loop); else cv.style.display='none';
}
</script>
